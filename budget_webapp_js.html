<script>
(function() {
  const CHART_COLORS = { income: "#0f766e", expense: "#d85b2c", budget: "#8e8172", target: "#174a7a" };
  const OTHER_EXPENSE_CATEGORY = "その他";
  const OTHER_INCOME_CATEGORY = "その他収入";
  const GROUP_LABELS = {
    business: "事業経費",
    private: "プライベート",
    review: "要確認"
  };
  const GROUP_CLASS = {
    business: "group-business",
    private: "group-private",
    review: "group-review"
  };

  const els = {
    monthPicker: document.querySelector("#monthPicker"),
    sheetLink: document.querySelector("#sheetLink"),
    statsGrid: document.querySelector("#statsGrid"),
    chartLegend: document.querySelector("#chartLegend"),
    chartSummary: document.querySelector("#chartSummary"),
    trendChart: document.querySelector("#trendChart"),
    annualStatsGrid: document.querySelector("#annualStatsGrid"),
    annualNote: document.querySelector("#annualNote"),
    quickEntryForm: document.querySelector("#quickEntryForm"),
    quickCategorySelect: document.querySelector("#quickCategorySelect"),
    quickCategoryDetailField: document.querySelector("#quickCategoryDetailField"),
    quickCategoryChips: document.querySelector("#quickCategoryChips"),
    amountPresetChips: document.querySelector("#amountPresetChips"),
    categoryTableBody: document.querySelector("#categoryTableBody"),
    incomeTargetTableBody: document.querySelector("#incomeTargetTableBody"),
    transactionTableBody: document.querySelector("#transactionTableBody"),
    summaryTableBody: document.querySelector("#summaryTableBody"),
    reviewTableBody: document.querySelector("#reviewTableBody"),
    incomeTargetForm: document.querySelector("#incomeTargetForm"),
    transactionForm: document.querySelector("#transactionForm"),
    transactionTypeSelect: document.querySelector("#transactionTypeSelect"),
    transactionCategorySelect: document.querySelector("#transactionCategorySelect"),
    transactionCategoryDetailField: document.querySelector("#transactionCategoryDetailField"),
    saveStatus: document.querySelector("#saveStatus"),
    emptyStateTemplate: document.querySelector("#emptyStateTemplate")
  };

  let state = sanitizeState(window.__BUDGET_BOOTSTRAP__ || {});

  initialize();

  function initialize() {
    hydrateQuickForm();
    hydrateTransactionForm();
    bindEvents();
    render();
  }

  function bindEvents() {
    els.monthPicker.addEventListener("change", function(event) {
      state.selectedMonth = event.target.value || getMonthKey(new Date());
      render();
    });

    els.incomeTargetForm.addEventListener("submit", function(event) {
      event.preventDefault();
      const formData = new FormData(event.currentTarget);
      const name = cleanText(formData.get("name"));
      const target = normalizeAmount(formData.get("target"));
      if (!name) return;
      state.incomeTargets.unshift({ id: createId(), name: name, target: target });
      event.currentTarget.reset();
      persistState("収益目標を保存中...");
    });

    els.transactionForm.addEventListener("submit", function(event) {
      event.preventDefault();
      if (!appendTransaction(new FormData(event.currentTarget))) return;
      const activeType = event.currentTarget.elements.type.value || "expense";
      const activeDate = event.currentTarget.elements.date.value || todayString();
      event.currentTarget.reset();
      event.currentTarget.elements.type.value = activeType;
      event.currentTarget.elements.date.value = activeDate;
      syncTransactionCategoryControls();
      persistState("入出金を保存中...");
    });

    els.quickEntryForm.addEventListener("submit", function(event) {
      event.preventDefault();
      if (!appendTransaction(new FormData(event.currentTarget))) return;
      const type = event.currentTarget.elements.type.value || "expense";
      const date = event.currentTarget.elements.date.value || todayString();
      event.currentTarget.reset();
      event.currentTarget.elements.type.value = type;
      event.currentTarget.elements.date.value = date;
      updateQuickTypeButtons(type);
      syncQuickCategoryControls();
      event.currentTarget.elements.amount.focus();
      persistState("入出金を保存中...");
    });

    els.quickEntryForm.querySelectorAll("[data-quick-type]").forEach(function(button) {
      button.addEventListener("click", function() {
        setQuickType(button.dataset.quickType);
      });
    });

    els.transactionTypeSelect.addEventListener("change", syncTransactionCategoryControls);
    els.quickCategorySelect.addEventListener("change", syncQuickCategoryControls);
    els.transactionCategorySelect.addEventListener("change", syncTransactionCategoryControls);

    els.quickCategoryChips.addEventListener("click", function(event) {
      const button = event.target.closest("[data-category]");
      if (!button) return;
      els.quickCategorySelect.value = button.dataset.category || "";
      syncQuickCategoryControls();
    });

    els.amountPresetChips.addEventListener("click", function(event) {
      const button = event.target.closest("[data-amount]");
      if (!button) return;
      els.quickEntryForm.elements.amount.value = button.dataset.amount || "";
    });

    [els.incomeTargetTableBody, els.transactionTableBody].forEach(function(element) {
      element.addEventListener("click", handleDeleteClick);
    });

    els.categoryTableBody.addEventListener("change", function(event) {
      const input = event.target.closest("[data-budget-id]");
      if (!input) return;
      const id = input.dataset.budgetId;
      const nextBudget = normalizeAmount(input.value);
      state.categories = state.categories.map(function(item) {
        return item.id === id ? { id: item.id, name: item.name, budget: nextBudget } : item;
      });
      persistState("カテゴリ予算を保存中...");
    });
  }

  function appendTransaction(formData) {
    const date = cleanText(formData.get("date"));
    const type = cleanText(formData.get("type"));
    const category = cleanText(formData.get("category"));
    const categoryDetail = cleanText(formData.get("categoryDetail"));
    const amount = normalizeAmount(formData.get("amount"));
    let note = cleanText(formData.get("note"));

    if (!date || !category || ["expense", "income"].indexOf(type) === -1) return false;

    if ((category === OTHER_EXPENSE_CATEGORY || category === OTHER_INCOME_CATEGORY) && !categoryDetail) {
      els.saveStatus.textContent = "その他を選んだ場合は内容を入力してください";
      return false;
    }

    if (categoryDetail) {
      note = note ? ("要確認: " + categoryDetail + " / " + note) : ("要確認: " + categoryDetail);
    }

    state.transactions.unshift({
      id: createId(),
      date: date,
      type: type,
      category: category,
      amount: amount,
      note: note
    });
    state.selectedMonth = getMonthKey(date);
    return true;
  }

  function handleDeleteClick(event) {
    const button = event.target.closest("[data-action='delete']");
    if (!button) return;
    const kind = button.dataset.kind;
    const id = button.dataset.id;
    if (kind === "incomeTarget") {
      state.incomeTargets = state.incomeTargets.filter(function(item) { return item.id !== id; });
    } else if (kind === "transaction") {
      state.transactions = state.transactions.filter(function(item) { return item.id !== id; });
    }
    persistState("削除内容を保存中...");
  }

  function persistState(message) {
    els.saveStatus.textContent = message;
    render();
    google.script.run
      .withSuccessHandler(function(payload) {
        state = sanitizeState(payload);
        render();
        els.saveStatus.textContent = "保存済み";
      })
      .withFailureHandler(function(error) {
        els.saveStatus.textContent = "保存に失敗しました: " + (error && error.message ? error.message : error);
      })
      .saveBudgetAppPayload(state);
  }

  function render() {
    const summary = computeSummary(state, state.selectedMonth);
    const yearSummary = computeYearSummary(state, state.selectedMonth, summary.totalBudget, summary.totalIncomeTarget);

    els.monthPicker.value = state.selectedMonth;
    els.sheetLink.href = state.spreadsheetUrl || "#";

    renderStats(summary);
    renderTrendChart(summary, yearSummary);
    renderAnnualOverview(yearSummary);
    renderQuickCategoryChips();
    renderCategoryBudgets();
    renderIncomeTargets();
    renderTransactions();
    renderReviewTray();
    renderSummary(summary);
    syncQuickCategoryControls();
    syncTransactionCategoryControls();
  }

  function renderStats(summary) {
    const cards = [
      {
        label: "Remaining Budget",
        value: formatCurrency(summary.remainingBudget),
        valueClass: summary.remainingBudget < 0 ? "negative" : "positive",
        subtext: "予算 " + formatCurrency(summary.totalBudget) + " に対して残り " + formatPercent(summary.remainingBudgetRate)
      },
      {
        label: "Expense Ratio",
        value: formatPercent(summary.budgetUsageRate),
        valueClass: summary.budgetUsageRate > 1 ? "negative" : "positive",
        subtext: "支出 " + formatCurrency(summary.totalExpenses) + " / 予算 " + formatCurrency(summary.totalBudget)
      },
      {
        label: "Income Achievement",
        value: formatPercent(summary.incomeAchievementRate),
        valueClass: summary.incomeAchievementRate >= 1 ? "positive" : "",
        subtext: "収入 " + formatCurrency(summary.totalIncomeActual) + " / 目標 " + formatCurrency(summary.totalIncomeTarget)
      },
      {
        label: "Pending Review",
        value: String(summary.reviewCount) + "件",
        valueClass: summary.reviewCount > 0 ? "negative" : "positive",
        subtext: summary.reviewAmount > 0 ? ("要確認金額 " + formatCurrency(summary.reviewAmount)) : "今月の要確認入力はありません"
      }
    ];

    els.statsGrid.innerHTML = cards.map(function(card) {
      return "<article class=\"stat-card\"><p class=\"stat-label\">" + escapeHtml(card.label) + "</p><p class=\"stat-value " + card.valueClass + "\">" + escapeHtml(card.value) + "</p><p class=\"stat-subtext\">" + escapeHtml(card.subtext) + "</p></article>";
    }).join("");
  }

  function renderTrendChart(summary, yearSummary) {
    els.chartLegend.innerHTML = [
      createLegendItem("収入", CHART_COLORS.income),
      createLegendItem("支出", CHART_COLORS.expense),
      createLegendItem("月予算", CHART_COLORS.budget),
      createLegendItem("月収益目標", CHART_COLORS.target)
    ].join("");

    const activeMonth = yearSummary.months[yearSummary.activeMonthIndex];
    els.chartSummary.textContent = yearSummary.year + "年の推移です。" + activeMonth.label + "は収入 " + formatCurrency(activeMonth.income) + "、支出 " + formatCurrency(activeMonth.expense) + "、予算消化率 " + formatPercent(summary.budgetUsageRate) + " です。";
    els.trendChart.innerHTML = buildTrendChartSvg(yearSummary);
  }

  function renderAnnualOverview(yearSummary) {
    const cards = [
      {
        label: "Year Expense Pace",
        value: formatCurrency(yearSummary.expenseAnnualPace),
        valueClass: yearSummary.expensePaceRate > 1 ? "negative" : "positive",
        meta: "年間予算比 " + formatPercent(yearSummary.expensePaceRate)
      },
      {
        label: "Year Income Pace",
        value: formatCurrency(yearSummary.incomeAnnualPace),
        valueClass: yearSummary.incomePaceRate >= 1 ? "positive" : "",
        meta: "年間目標比 " + formatPercent(yearSummary.incomePaceRate)
      },
      {
        label: "YTD Expense Ratio",
        value: formatPercent(yearSummary.expenseYtdRate),
        valueClass: yearSummary.expenseYtdRate > 1 ? "negative" : "positive",
        meta: "累計支出 " + formatCurrency(yearSummary.expenseYtd) + " / 累計予算 " + formatCurrency(yearSummary.budgetYtd)
      },
      {
        label: "YTD Income Ratio",
        value: formatPercent(yearSummary.incomeYtdRate),
        valueClass: yearSummary.incomeYtdRate >= 1 ? "positive" : "",
        meta: "累計収入 " + formatCurrency(yearSummary.incomeYtd) + " / 累計目標 " + formatCurrency(yearSummary.incomeTargetYtd)
      }
    ];

    els.annualStatsGrid.innerHTML = cards.map(function(card) {
      return "<article class=\"annual-card\"><p class=\"annual-card-label\">" + escapeHtml(card.label) + "</p><p class=\"annual-card-value " + card.valueClass + "\">" + escapeHtml(card.value) + "</p><p class=\"annual-card-meta\">" + escapeHtml(card.meta) + "</p></article>";
    }).join("");
    els.annualNote.textContent = yearSummary.year + "年1月から" + (yearSummary.activeMonthIndex + 1) + "月までの平均を12か月換算したペースです。";
  }

  function renderQuickCategoryChips() {
    const type = els.quickEntryForm.elements.type.value || "expense";
    const recentCategories = state.transactions
      .filter(function(item) { return item.type === type; })
      .map(function(item) { return item.category; });

    const baseCategories = type === "expense"
      ? state.categories.map(function(item) { return item.name; }).filter(function(name) { return name !== OTHER_EXPENSE_CATEGORY; })
      : state.incomeTargets.map(function(item) { return item.name; });

    const labels = uniqueValues(recentCategories.concat(baseCategories)).slice(0, 8);

    els.quickCategoryChips.innerHTML = labels.length ? labels.map(function(label) {
      return "<button type=\"button\" class=\"chip-button\" data-category=\"" + escapeHtml(label) + "\">" + escapeHtml(label) + "</button>";
    }).join("") : "<span class=\"chip-title\">カテゴリ候補はここに表示されます。</span>";
  }

  function renderCategoryBudgets() {
    els.categoryTableBody.innerHTML = state.categories.length ? state.categories.map(function(item) {
      const meta = getExpenseCategoryMeta(item.name);
      const group = meta ? meta.group : "review";
      const description = meta ? meta.description : "要確認カテゴリ";
      return "<tr>"
        + "<td><div class=\"category-name\"><strong>" + escapeHtml(item.name) + "</strong><span class=\"category-note\">" + escapeHtml(description) + "</span></div></td>"
        + "<td><span class=\"group-badge " + GROUP_CLASS[group] + "\">" + escapeHtml(GROUP_LABELS[group]) + "</span></td>"
        + "<td><input class=\"budget-input\" data-budget-id=\"" + escapeHtml(item.id) + "\" type=\"number\" min=\"0\" step=\"1000\" value=\"" + escapeHtml(String(item.budget)) + "\"></td>"
        + "</tr>";
    }).join("") : renderEmptyState(3);
  }

  function renderIncomeTargets() {
    els.incomeTargetTableBody.innerHTML = state.incomeTargets.length ? state.incomeTargets.map(function(item) {
      return "<tr><td>" + escapeHtml(item.name) + "</td><td>" + escapeHtml(formatCurrency(item.target)) + "</td><td><button class=\"danger\" type=\"button\" data-action=\"delete\" data-kind=\"incomeTarget\" data-id=\"" + escapeHtml(item.id) + "\">削除</button></td></tr>";
    }).join("") : renderEmptyState(3);
  }

  function renderTransactions() {
    const monthTransactions = state.transactions
      .filter(function(item) { return getMonthKey(item.date) === state.selectedMonth; })
      .sort(function(a, b) { return b.date.localeCompare(a.date); });

    els.transactionTableBody.innerHTML = monthTransactions.length ? monthTransactions.map(function(item) {
      const isReview = item.type === "expense" && isReviewCategory(item.category);
      return "<tr class=\"" + (isReview ? "row-review" : "") + "\">"
        + "<td>" + escapeHtml(formatDateLabel(item.date)) + "</td>"
        + "<td><span class=\"type-pill " + (item.type === "expense" ? "type-expense\">支出" : "type-income\">収入") + "</span></td>"
        + "<td>" + escapeHtml(item.category) + "</td>"
        + "<td>" + escapeHtml(formatCurrency(item.amount)) + "</td>"
        + "<td>" + escapeHtml(item.note || "-") + "</td>"
        + "<td><button class=\"danger\" type=\"button\" data-action=\"delete\" data-kind=\"transaction\" data-id=\"" + escapeHtml(item.id) + "\">削除</button></td>"
        + "</tr>";
    }).join("") : renderEmptyState(6);
  }

  function renderReviewTray() {
    const reviewItems = state.transactions
      .filter(function(item) {
        return item.type === "expense" && getMonthKey(item.date) === state.selectedMonth && isReviewCategory(item.category);
      })
      .sort(function(a, b) { return b.date.localeCompare(a.date); });

    els.reviewTableBody.innerHTML = reviewItems.length ? reviewItems.map(function(item) {
      return "<tr>"
        + "<td>" + escapeHtml(formatDateLabel(item.date)) + "</td>"
        + "<td>" + escapeHtml(item.category) + "</td>"
        + "<td>" + escapeHtml(formatCurrency(item.amount)) + "</td>"
        + "<td>" + escapeHtml(item.note || "-") + "</td>"
        + "</tr>";
    }).join("") : renderEmptyState(4);
  }

  function renderSummary(summary) {
    els.summaryTableBody.innerHTML = summary.categoryRows.length ? summary.categoryRows.map(function(row) {
      return "<tr><td>" + escapeHtml(row.name) + "</td><td>" + escapeHtml(formatCurrency(row.budget)) + "</td><td>" + escapeHtml(formatCurrency(row.spent)) + "</td><td class=\"" + (row.remaining < 0 ? "negative" : "positive") + "\">" + escapeHtml(formatCurrency(row.remaining)) + "</td><td class=\"progress-text\">" + escapeHtml(formatPercent(row.progress)) + "</td></tr>";
    }).join("") : renderEmptyState(5);
  }

  function computeSummary(currentState, monthKey) {
    const monthTransactions = currentState.transactions.filter(function(item) { return getMonthKey(item.date) === monthKey; });
    const expenseTransactions = monthTransactions.filter(function(item) { return item.type === "expense"; });
    const incomeTransactions = monthTransactions.filter(function(item) { return item.type === "income"; });
    const totalBudget = currentState.categories.reduce(function(sum, item) { return sum + item.budget; }, 0);
    const totalExpenses = expenseTransactions.reduce(function(sum, item) { return sum + item.amount; }, 0);
    const totalIncomeTarget = currentState.incomeTargets.reduce(function(sum, item) { return sum + item.target; }, 0);
    const totalIncomeActual = incomeTransactions.reduce(function(sum, item) { return sum + item.amount; }, 0);
    const remainingBudget = totalBudget - totalExpenses;
    const reviewTransactions = expenseTransactions.filter(function(item) { return isReviewCategory(item.category); });

    return {
      totalBudget: totalBudget,
      totalExpenses: totalExpenses,
      totalIncomeTarget: totalIncomeTarget,
      totalIncomeActual: totalIncomeActual,
      remainingBudget: remainingBudget,
      incomeGap: totalIncomeActual - totalIncomeTarget,
      budgetUsageRate: totalBudget > 0 ? totalExpenses / totalBudget : 0,
      remainingBudgetRate: totalBudget > 0 ? remainingBudget / totalBudget : 0,
      incomeAchievementRate: totalIncomeTarget > 0 ? totalIncomeActual / totalIncomeTarget : 0,
      reviewCount: reviewTransactions.length,
      reviewAmount: reviewTransactions.reduce(function(sum, item) { return sum + item.amount; }, 0),
      categoryRows: currentState.categories.map(function(category) {
        const spent = expenseTransactions
          .filter(function(item) { return item.category === category.name; })
          .reduce(function(sum, item) { return sum + item.amount; }, 0);
        return {
          name: category.name,
          budget: category.budget,
          spent: spent,
          remaining: category.budget - spent,
          progress: category.budget > 0 ? spent / category.budget : 0
        };
      })
    };
  }

  function computeYearSummary(currentState, monthKey, monthlyBudget, monthlyIncomeTarget) {
    const parts = monthKey.split("-");
    const yearText = parts[0];
    const activeMonthIndex = Number(parts[1]) - 1;
    const months = Array.from({ length: 12 }, function(_, index) {
      return { month: index + 1, label: (index + 1) + "月", income: 0, expense: 0 };
    });

    currentState.transactions.forEach(function(item) {
      if (item.date.indexOf(yearText + "-") !== 0) return;
      const monthIndex = Number(item.date.slice(5, 7)) - 1;
      if (monthIndex < 0 || monthIndex > 11) return;
      months[monthIndex][item.type] += item.amount;
    });

    const elapsedMonths = Math.max(activeMonthIndex + 1, 1);
    const incomeYtd = months.slice(0, elapsedMonths).reduce(function(sum, item) { return sum + item.income; }, 0);
    const expenseYtd = months.slice(0, elapsedMonths).reduce(function(sum, item) { return sum + item.expense; }, 0);
    const budgetYtd = monthlyBudget * elapsedMonths;
    const incomeTargetYtd = monthlyIncomeTarget * elapsedMonths;
    const annualBudget = monthlyBudget * 12;
    const annualIncomeTarget = monthlyIncomeTarget * 12;
    const expenseAnnualPace = expenseYtd / elapsedMonths * 12;
    const incomeAnnualPace = incomeYtd / elapsedMonths * 12;

    return {
      year: Number(yearText),
      activeMonthIndex: activeMonthIndex,
      months: months,
      monthlyBudget: monthlyBudget,
      monthlyIncomeTarget: monthlyIncomeTarget,
      expenseYtd: expenseYtd,
      incomeYtd: incomeYtd,
      budgetYtd: budgetYtd,
      incomeTargetYtd: incomeTargetYtd,
      expenseAnnualPace: expenseAnnualPace,
      incomeAnnualPace: incomeAnnualPace,
      expensePaceRate: annualBudget > 0 ? expenseAnnualPace / annualBudget : 0,
      incomePaceRate: annualIncomeTarget > 0 ? incomeAnnualPace / annualIncomeTarget : 0,
      expenseYtdRate: budgetYtd > 0 ? expenseYtd / budgetYtd : 0,
      incomeYtdRate: incomeTargetYtd > 0 ? incomeYtd / incomeTargetYtd : 0
    };
  }

  function buildTrendChartSvg(yearSummary) {
    const width = 760;
    const height = 300;
    const padding = { top: 20, right: 24, bottom: 42, left: 58 };
    const chartWidth = width - padding.left - padding.right;
    const chartHeight = height - padding.top - padding.bottom;
    const stepX = chartWidth / 11;
    const maxValue = getNiceMax([].concat(
      yearSummary.months.map(function(item) { return item.income; }),
      yearSummary.months.map(function(item) { return item.expense; }),
      [yearSummary.monthlyBudget, yearSummary.monthlyIncomeTarget]
    ));
    const x = function(index) { return padding.left + stepX * index; };
    const y = function(value) { return padding.top + chartHeight - value / maxValue * chartHeight; };
    const activeX = x(yearSummary.activeMonthIndex);
    const highlightWidth = stepX * .72;
    const incomePoints = yearSummary.months.map(function(item, index) { return { x: x(index), y: y(item.income) }; });
    const expensePoints = yearSummary.months.map(function(item, index) { return { x: x(index), y: y(item.expense) }; });
    const gridValues = [0, maxValue * .25, maxValue * .5, maxValue * .75, maxValue];
    const gridLines = gridValues.map(function(value) {
      return "<g><line x1=\"" + padding.left + "\" y1=\"" + y(value) + "\" x2=\"" + (width - padding.right) + "\" y2=\"" + y(value) + "\" stroke=\"rgba(23,23,23,0.10)\" stroke-width=\"1\" /><text x=\"" + (padding.left - 10) + "\" y=\"" + (y(value) + 4) + "\" text-anchor=\"end\" fill=\"#666056\" font-size=\"11\">" + escapeHtml(formatAxisValue(value)) + "</text></g>";
    }).join("");
    const xLabels = yearSummary.months.map(function(item, index) {
      return "<text x=\"" + x(index) + "\" y=\"" + (height - 14) + "\" text-anchor=\"middle\" fill=\"#666056\" font-size=\"11\">" + escapeHtml(item.label) + "</text>";
    }).join("");
    const guideLines = [
      { label: "月予算", value: yearSummary.monthlyBudget, color: CHART_COLORS.budget },
      { label: "月収益目標", value: yearSummary.monthlyIncomeTarget, color: CHART_COLORS.target }
    ].filter(function(item) {
      return item.value > 0;
    }).map(function(item) {
      return "<g><line x1=\"" + padding.left + "\" y1=\"" + y(item.value) + "\" x2=\"" + (width - padding.right) + "\" y2=\"" + y(item.value) + "\" stroke=\"" + item.color + "\" stroke-width=\"1.5\" stroke-dasharray=\"6 6\" opacity=\"0.52\" /><text x=\"" + (width - padding.right) + "\" y=\"" + (y(item.value) - 6) + "\" text-anchor=\"end\" fill=\"" + item.color + "\" font-size=\"11\">" + escapeHtml(item.label) + "</text></g>";
    }).join("");

    return "<svg viewBox=\"0 0 " + width + " " + height + "\">"
      + "<rect x=\"" + (activeX - highlightWidth / 2) + "\" y=\"" + padding.top + "\" width=\"" + highlightWidth + "\" height=\"" + chartHeight + "\" fill=\"rgba(15,118,110,0.08)\" rx=\"12\" />"
      + gridLines
      + guideLines
      + buildLinePath(incomePoints, CHART_COLORS.income)
      + buildLinePath(expensePoints, CHART_COLORS.expense)
      + buildPoints(incomePoints, CHART_COLORS.income)
      + buildPoints(expensePoints, CHART_COLORS.expense)
      + xLabels
      + "</svg>";
  }

  function buildLinePath(points, color) {
    return "<path d=\"" + points.map(function(point, index) {
      return (index === 0 ? "M" : "L") + " " + point.x + " " + point.y;
    }).join(" ") + "\" fill=\"none\" stroke=\"" + color + "\" stroke-width=\"3.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\" />";
  }

  function buildPoints(points, color) {
    return points.map(function(point) {
      return "<circle cx=\"" + point.x + "\" cy=\"" + point.y + "\" r=\"4.5\" fill=\"" + color + "\" /><circle cx=\"" + point.x + "\" cy=\"" + point.y + "\" r=\"8\" fill=\"" + color + "\" opacity=\"0.12\" />";
    }).join("");
  }

  function createLegendItem(label, color) {
    return "<span class=\"legend-item\"><span class=\"legend-swatch\" style=\"background:" + color + "\"></span>" + escapeHtml(label) + "</span>";
  }

  function getNiceMax(values) {
    const max = Math.max.apply(null, values.concat([1]));
    const magnitude = Math.pow(10, Math.floor(Math.log(max) / Math.LN10));
    const normalized = max / magnitude;
    if (normalized <= 1) return magnitude;
    if (normalized <= 2) return 2 * magnitude;
    if (normalized <= 5) return 5 * magnitude;
    return 10 * magnitude;
  }

  function hydrateQuickForm() {
    els.quickEntryForm.elements.date.value = todayString();
    els.quickEntryForm.elements.type.value = "expense";
    updateQuickTypeButtons("expense");
  }

  function hydrateTransactionForm() {
    els.transactionForm.elements.date.value = todayString();
    els.transactionForm.elements.type.value = "expense";
  }

  function setQuickType(type) {
    els.quickEntryForm.elements.type.value = type;
    updateQuickTypeButtons(type);
    renderQuickCategoryChips();
    syncQuickCategoryControls();
  }

  function updateQuickTypeButtons(activeType) {
    els.quickEntryForm.querySelectorAll("[data-quick-type]").forEach(function(button) {
      button.classList.toggle("active", button.dataset.quickType === activeType);
    });
  }

  function syncQuickCategoryControls() {
    syncCategorySelect({
      type: els.quickEntryForm.elements.type.value || "expense",
      selectEl: els.quickCategorySelect,
      detailWrapEl: els.quickCategoryDetailField,
      detailInputEl: els.quickEntryForm.elements.categoryDetail,
      preferred: els.quickCategorySelect.value
    });
  }

  function syncTransactionCategoryControls() {
    syncCategorySelect({
      type: els.transactionTypeSelect.value || "expense",
      selectEl: els.transactionCategorySelect,
      detailWrapEl: els.transactionCategoryDetailField,
      detailInputEl: els.transactionForm.elements.categoryDetail,
      preferred: els.transactionCategorySelect.value
    });
  }

  function syncCategorySelect(config) {
    const options = getCategoryOptions(config.type);
    const currentValue = options.some(function(item) { return item.value === config.preferred; })
      ? config.preferred
      : (options[0] ? options[0].value : "");
    config.selectEl.innerHTML = buildOptionMarkup(options);
    config.selectEl.value = currentValue;

    const isOther = currentValue === OTHER_EXPENSE_CATEGORY || currentValue === OTHER_INCOME_CATEGORY;
    config.detailWrapEl.classList.toggle("is-hidden", !isOther);
    if (!isOther) config.detailInputEl.value = "";
  }

  function getCategoryOptions(type) {
    if (type === "income") {
      const items = state.incomeTargets.map(function(item) {
        return { value: item.name, label: item.name, group: "収入項目" };
      });
      items.push({ value: OTHER_INCOME_CATEGORY, label: OTHER_INCOME_CATEGORY, group: "収入項目" });
      return items;
    }

    return state.categoryCatalog.map(function(item) {
      return {
        value: item.name,
        label: item.name,
        group: GROUP_LABELS[item.group] || GROUP_LABELS.review
      };
    });
  }

  function buildOptionMarkup(options) {
    const grouped = {};
    options.forEach(function(item) {
      if (!grouped[item.group]) grouped[item.group] = [];
      grouped[item.group].push(item);
    });

    return Object.keys(grouped).map(function(groupName) {
      return "<optgroup label=\"" + escapeHtml(groupName) + "\">" + grouped[groupName].map(function(item) {
        return "<option value=\"" + escapeHtml(item.value) + "\">" + escapeHtml(item.label) + "</option>";
      }).join("") + "</optgroup>";
    }).join("");
  }

  function sanitizeState(value) {
    const selectedMonth = typeof value.selectedMonth === "string" && /^\d{4}-\d{2}$/.test(value.selectedMonth)
      ? value.selectedMonth
      : getMonthKey(new Date());
    const categoryCatalog = sanitizeCategoryCatalog(value.categoryCatalog);
    return {
      selectedMonth: selectedMonth,
      spreadsheetUrl: cleanText(value.spreadsheetUrl),
      categoryCatalog: categoryCatalog,
      categories: normalizeCategoryBudgets(
        Array.isArray(value.categories) ? value.categories.map(function(item) {
          return { id: cleanText(item.id) || createId(), name: cleanText(item.name), budget: normalizeAmount(item.budget) };
        }).filter(function(item) { return item.name; }) : [],
        categoryCatalog
      ),
      incomeTargets: Array.isArray(value.incomeTargets) ? value.incomeTargets.map(function(item) {
        return { id: cleanText(item.id) || createId(), name: cleanText(item.name), target: normalizeAmount(item.target) };
      }).filter(function(item) { return item.name; }) : [],
      transactions: Array.isArray(value.transactions) ? value.transactions.map(function(item) {
        return {
          id: cleanText(item.id) || createId(),
          date: cleanText(item.date),
          type: item.type === "income" ? "income" : "expense",
          category: cleanText(item.category),
          amount: normalizeAmount(item.amount),
          note: cleanText(item.note)
        };
      }).filter(function(item) { return item.date && item.category; }) : []
    };
  }

  function sanitizeCategoryCatalog(items) {
    if (!Array.isArray(items) || !items.length) return getFallbackCategoryCatalog();
    return items.map(function(item) {
      return {
        name: cleanText(item.name),
        group: cleanText(item.group) || "review",
        description: cleanText(item.description)
      };
    }).filter(function(item) { return item.name; });
  }

  function normalizeCategoryBudgets(items, catalog) {
    const map = {};
    items.forEach(function(item) {
      map[item.name] = item;
    });
    return catalog.map(function(meta) {
      const existing = map[meta.name];
      return {
        id: existing ? existing.id : createId(),
        name: meta.name,
        budget: existing ? normalizeAmount(existing.budget) : 0
      };
    });
  }

  function getExpenseCategoryMeta(name) {
    return state.categoryCatalog.find(function(item) { return item.name === name; }) || null;
  }

  function isReviewCategory(name) {
    const meta = getExpenseCategoryMeta(name);
    return meta ? meta.group === "review" : true;
  }

  function getFallbackCategoryCatalog() {
    return [
      { name: "交通費", group: "business", description: "電車・飛行機・新幹線など" },
      { name: "会議費", group: "business", description: "打ち合わせ・カフェ利用" },
      { name: "接待交際費", group: "business", description: "会食・接待関連" },
      { name: "福利厚生費", group: "business", description: "従業員向け支出" },
      { name: "消耗品費", group: "business", description: "備品・日用品" },
      { name: "通信費", group: "business", description: "スマホ・回線費" },
      { name: "広告宣伝費", group: "business", description: "広告・販促費" },
      { name: "外注費", group: "business", description: "業務委託・制作費" },
      { name: "支払手数料", group: "business", description: "税理士・振込手数料など" },
      { name: "法定福利費", group: "business", description: "会社負担の社会保険等" },
      { name: "地代家賃", group: "business", description: "家賃按分など" },
      { name: "水道光熱費", group: "business", description: "電気・ガス・水道" },
      { name: "ホームページ維持費", group: "business", description: "サイト・ドメイン維持" },
      { name: "租税公課", group: "business", description: "事業に関する税公課" },
      { name: "雑費", group: "business", description: "上記以外の少額経費" },
      { name: OTHER_EXPENSE_CATEGORY, group: "review", description: "あとで判定する支出" }
    ];
  }

  function renderEmptyState(columnCount) {
    return els.emptyStateTemplate.innerHTML.trim().replace('colspan="6"', 'colspan="' + columnCount + '"');
  }

  function formatCurrency(value) {
    return new Intl.NumberFormat("ja-JP", { style: "currency", currency: "JPY", maximumFractionDigits: 0 }).format(Number(value) || 0);
  }

  function formatPercent(value) {
    const percent = (Number(value) || 0) * 100;
    return trimDecimal(percent) + "%";
  }

  function trimDecimal(value) {
    const fixed = value.toFixed(1);
    return fixed.endsWith(".0") ? fixed.slice(0, -2) : fixed;
  }

  function formatAxisValue(value) {
    if (value >= 1000000) return trimDecimal(value / 1000000) + "M";
    if (value >= 1000) return trimDecimal(value / 1000) + "k";
    return String(Math.round(value));
  }

  function formatMonthLabel(monthKey) {
    const parts = monthKey.split("-");
    return parts[0] + "年" + Number(parts[1]) + "月";
  }

  function formatDateLabel(dateText) {
    return dateText.replaceAll("-", "/");
  }

  function getMonthKey(value) {
    if (typeof value === "string") return value.slice(0, 7);
    const y = value.getFullYear();
    const m = String(value.getMonth() + 1).padStart(2, "0");
    return y + "-" + m;
  }

  function normalizeAmount(value) {
    const num = Number(value);
    return Number.isFinite(num) ? Math.max(0, Math.round(num)) : 0;
  }

  function cleanText(value) {
    return String(value || "").trim();
  }

  function createId() {
    return Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
  }

  function uniqueValues(values) {
    return Array.from(new Set(values.filter(Boolean)));
  }

  function todayString() {
    const now = new Date();
    return now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, "0") + "-" + String(now.getDate()).padStart(2, "0");
  }

  function escapeHtml(value) {
    return String(value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#39;");
  }
})();
</script>
