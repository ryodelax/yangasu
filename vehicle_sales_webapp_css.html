<style>
:root {
  --ink: #17202a;
  --muted: #5c6773;
  --line: rgba(23, 32, 42, 0.12);
  --panel: rgba(255, 250, 244, 0.82);
  --accent: #8e2f22;
  --accent-strong: #5e1f16;
  --accent-soft: #d9b491;
  --teal: #0f6a67;
  --gold: #d9a441;
  --danger: #9b2c2c;
  --shadow: 0 24px 70px rgba(34, 29, 24, 0.14);
  --radius: 24px;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  color: var(--ink);
  font-family: "Avenir Next", "Hiragino Sans", sans-serif;
  background:
    radial-gradient(circle at 0% 0%, rgba(217, 164, 65, 0.18), transparent 24%),
    radial-gradient(circle at 100% 20%, rgba(15, 106, 103, 0.16), transparent 22%),
    linear-gradient(155deg, #f5efe7 0%, #efe4d7 48%, #f7f4ef 100%);
}
button, input, select, textarea { font: inherit; }
button { cursor: pointer; }
a { color: inherit; }
.glow {
  position: fixed;
  width: 28rem;
  height: 28rem;
  border-radius: 999px;
  filter: blur(92px);
  opacity: 0.34;
  pointer-events: none;
}
.glow-left { top: -8rem; left: -10rem; background: rgba(142, 47, 34, 0.28); }
.glow-right { right: -10rem; top: 28%; background: rgba(15, 106, 103, 0.24); }
.app-shell {
  position: relative;
  z-index: 1;
  width: min(1280px, calc(100% - 28px));
  margin: 0 auto;
  padding: 28px 0 52px;
}
.hero, .panel, .stat-card {
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}
.hero, .panel, .stat-card {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}
.hero {
  display: grid;
  grid-template-columns: minmax(0, 1.28fr) minmax(280px, 0.72fr);
  align-items: end;
  gap: 32px;
  padding: 34px;
  background: linear-gradient(140deg, rgba(255,255,255,0.84), rgba(255,248,241,0.68));
}
.hero-copy { min-width: 0; }
.eyebrow, .section-label {
  margin: 0;
  color: var(--muted);
  letter-spacing: .14em;
  text-transform: uppercase;
  font-size: .74rem;
  font-weight: 700;
}
.hero h1, .panel h2 {
  margin: 10px 0 0;
  line-height: 1.06;
}
.hero h1 {
  font-size: clamp(2.1rem, 3.6vw, 3.55rem);
  max-width: 14ch;
  letter-spacing: -0.04em;
  text-wrap: balance;
  word-break: keep-all;
}
.hero p:last-child { margin: 16px 0 0; max-width: 48rem; color: var(--muted); line-height: 1.8; }
.hero-links {
  display: grid;
  align-content: center;
  gap: 12px;
}
.hero-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 54px;
  padding: 0 18px;
  border-radius: 18px;
  text-decoration: none;
  background: rgba(23, 32, 42, 0.92);
  color: #fff;
}
.hero-link.secondary {
  background: rgba(255,255,255,0.68);
  color: var(--ink);
}
.stats-grid, .content-grid {
  display: grid;
  gap: 20px;
  margin-top: 22px;
}
.workflow-panel { margin-top: 22px; }
.workflow-steps {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 12px;
}
.step-chip {
  min-height: 52px;
  background: rgba(255,255,255,0.72);
  color: var(--ink);
  border: 1px solid var(--line);
  font-weight: 700;
}
.step-chip.active {
  background: var(--accent);
  color: #fff;
  border-color: rgba(94, 31, 22, 0.28);
}
.wizard-section[hidden] { display: none !important; }
.stats-grid { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
.content-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
.content-grid.narrow-first { grid-template-columns: 1.15fr 0.85fr; }
.panel, .stat-card {
  background: var(--panel);
}
.panel { padding: 24px; }
.panel-heading {
  display: flex;
  gap: 12px;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.stat-card { padding: 22px; }
.stat-label {
  margin: 0;
  font-size: .82rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: .08em;
}
.stat-value {
  margin: 14px 0 0;
  font-size: clamp(1.65rem, 2.55vw, 2.7rem);
  font-weight: 800;
  line-height: 1.06;
  overflow-wrap: anywhere;
}
.stat-subtext { margin: 10px 0 0; color: var(--muted); line-height: 1.6; }
.stack-form { display: flex; flex-direction: column; gap: 16px; }
.form-grid { display: grid; gap: 12px; }
.form-grid.cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
.span-2 { grid-column: span 2; }
.form-divider {
  padding-top: 8px;
  margin-top: 4px;
  border-top: 1px solid var(--line);
  color: var(--accent-strong);
  font-size: .8rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  font-weight: 800;
}
label { display: flex; flex-direction: column; gap: 7px; }
label span { font-size: .86rem; color: var(--muted); }
.req {
  font-style: normal;
  color: var(--accent-strong);
  font-weight: 800;
  font-size: .75rem;
}
.step-guide {
  margin-bottom: 16px;
  padding: 14px 16px;
  border-radius: 16px;
  border: 1px solid rgba(23, 32, 42, 0.08);
  background: rgba(255,255,255,0.68);
}
.step-guide-title {
  margin: 0;
  font-size: .82rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--accent-strong);
  font-weight: 800;
}
.step-guide-body {
  margin: 8px 0 0;
  color: var(--muted);
  line-height: 1.7;
}
input, select, textarea, button {
  border-radius: 14px;
  border: 1px solid var(--line);
}
input, select, textarea {
  width: 100%;
  min-width: 0;
  padding: 12px 14px;
  background: rgba(255, 255, 255, 0.74);
}
textarea { resize: vertical; }
button {
  padding: 13px 18px;
  background: var(--accent);
  color: #fff;
  transition: transform 180ms ease, opacity 180ms ease;
}
button:hover { transform: translateY(-1px); opacity: .94; }
button.secondary {
  background: rgba(255,255,255,0.72);
  color: var(--ink);
}
button.danger {
  background: rgba(155, 44, 44, 0.1);
  color: var(--danger);
}
.form-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.logic-list {
  margin: 0;
  padding-left: 18px;
  color: var(--muted);
  line-height: 1.8;
}
.logic-list strong { color: var(--ink); }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th, td {
  padding: 13px 12px;
  border-bottom: 1px solid var(--line);
  text-align: left;
  vertical-align: middle;
}
th {
  font-size: .82rem;
  letter-spacing: .05em;
  text-transform: uppercase;
  color: var(--muted);
}
tbody tr:last-child td { border-bottom: none; }
.status-row { color: var(--muted); }
.pill {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 30px;
  padding: 0 10px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,0.72);
  font-size: .82rem;
  font-weight: 700;
  white-space: nowrap;
}
.pill.warn {
  background: rgba(142, 47, 34, 0.1);
  color: var(--accent-strong);
}
.pill.safe {
  background: rgba(15, 106, 103, 0.1);
  color: var(--teal);
}
.cell-note {
  display: block;
  margin-top: 4px;
  color: var(--muted);
  font-size: .82rem;
  line-height: 1.5;
}
.cell-amount {
  display: block;
  font-weight: 700;
}
.empty-state {
  padding: 28px 12px;
  text-align: center;
  color: var(--muted);
}
.negative { color: var(--danger); }
.positive { color: var(--teal); }
@media (max-width: 1040px) {
  .hero, .stats-grid, .content-grid, .content-grid.narrow-first { grid-template-columns: 1fr; }
  .workflow-steps { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .hero h1 { max-width: none; }
  .hero-links { align-content: stretch; }
}
@media (max-width: 720px) {
  .app-shell { width: min(100% - 18px, 1280px); padding-top: 18px; }
  .hero, .panel, .stat-card { border-radius: 20px; }
  .hero, .panel { padding: 18px; }
  .hero h1 { font-size: clamp(2rem, 9vw, 3rem); line-height: 1.04; }
  .stats-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .stat-card { padding: 18px; }
  .stat-value { font-size: 1.9rem; }
  .panel-heading { align-items: flex-start; }
  .workflow-steps { grid-template-columns: 1fr; }
  .form-grid.cols-2 { grid-template-columns: 1fr; }
  .span-2 { grid-column: span 1; }
  th, td { padding: 11px 8px; }
}
</style>
