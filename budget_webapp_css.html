<style>
:root {
  --panel: rgba(255, 255, 255, 0.76);
  --text: #1d1f1e;
  --muted: #5f645f;
  --line: rgba(29, 31, 30, 0.1);
  --accent: #0d7c66;
  --accent-strong: #0a5f4e;
  --accent-2: #f25c2a;
  --danger: #9d2b20;
  --shadow: 0 24px 80px rgba(39, 35, 30, 0.14);
  --radius: 24px;
}
* { box-sizing: border-box; }
body { margin: 0; min-height: 100vh; font-family: Arial, "Hiragino Sans", "Noto Sans JP", sans-serif; color: var(--text); background:
radial-gradient(circle at top left, rgba(242, 92, 42, 0.14), transparent 28%),
radial-gradient(circle at right center, rgba(13, 124, 102, 0.15), transparent 24%),
linear-gradient(160deg, #f8f4ed 0%, #efe5d7 100%); }
button,input,select { font: inherit; }
button { appearance: none; }
.ambient { position: fixed; width: 28rem; height: 28rem; border-radius: 999px; filter: blur(90px); opacity: 0.45; pointer-events: none; }
.ambient-left { top: -6rem; left: -8rem; background: rgba(242, 92, 42, 0.28); }
.ambient-right { right: -10rem; top: 30%; background: rgba(13, 124, 102, 0.22); }
.app-shell { position: relative; z-index: 1; width: min(1200px, calc(100% - 32px)); margin: 0 auto; padding: 32px 0 56px; }
.hero,.panel,.stat-card { backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
.hero { display:grid; grid-template-columns:1.7fr 0.9fr; gap:24px; align-items:end; padding:28px; border:1px solid var(--line); border-radius:calc(var(--radius) + 8px); background:linear-gradient(135deg, rgba(255,255,255,.82), rgba(255,248,240,.72)); box-shadow:var(--shadow);}
.eyebrow,.section-label,.month-caption { margin:0; color:var(--muted);}
.eyebrow,.section-label { letter-spacing:.12em; text-transform:uppercase; font-size:.72rem; font-weight:700;}
.hero h1,.panel h2 { margin:10px 0 0; line-height:1.05; }
.hero h1 { font-size:clamp(2rem,5vw,4.2rem); max-width:10ch; }
.hero-copy { margin:18px 0 0; max-width:50rem; color:var(--muted); line-height:1.75; }
.month-panel { padding:20px; border-radius:20px; background:linear-gradient(180deg, rgba(17,29,27,.94), rgba(24,48,44,.92)); color:#fff; }
.month-panel label { display:block; margin-bottom:10px; font-size:.95rem; color:rgba(255,255,255,.72); }
.month-panel input { width:100%; padding:14px 16px; border:1px solid rgba(255,255,255,.16); border-radius:14px; background:rgba(255,255,255,.1); color:#fff; }
.month-caption { margin-top:12px; color:rgba(255,255,255,.72); }
.sheet-link { display:inline-block; margin-top:14px; color:#fff; text-decoration:underline; }
.stats-grid,.content-grid,.insight-grid { display:grid; gap:20px; margin-top:22px; }
.stats-grid { grid-template-columns:repeat(4,minmax(0,1fr)); }
.content-grid { grid-template-columns:repeat(2,minmax(0,1fr)); }
.insight-grid { grid-template-columns:minmax(0,1.45fr) minmax(0,.95fr); }
.stat-card,.panel { border:1px solid var(--line); border-radius:var(--radius); background:var(--panel); box-shadow:var(--shadow); }
.stat-card { padding:22px; }
.stat-label { margin:0; font-size:.82rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }
.stat-value { margin:14px 0 0; font-size:clamp(1.8rem,3vw,2.7rem); font-weight:800; }
.stat-subtext { margin:10px 0 0; color:var(--muted); }
.panel { margin-top:22px; padding:24px; }
.mobile-panel { background:linear-gradient(180deg, rgba(255,252,246,.88), rgba(255,255,255,.78)); }
.panel-heading,.transaction-heading,.inline-form,.transaction-form,.quick-entry-form,.chart-legend { display:flex; gap:12px; }
.panel-heading,.transaction-heading { align-items:center; justify-content:space-between; }
.inline-form,.transaction-form { flex-wrap:wrap; justify-content:flex-end; }
.compact-heading { margin-bottom:18px; }
.quick-entry-form { flex-direction:column; }
.quick-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; }
.field-block { display:flex; flex-direction:column; gap:8px; }
.field-block span,.chip-title { margin:0; font-size:.84rem; color:var(--muted); }
.quick-type-switch,.chip-group { display:flex; gap:10px; flex-wrap:wrap; }
.type-toggle,.chip-button { background:rgba(255,255,255,.84); color:var(--text); }
.type-toggle.active { background:var(--accent); color:#fff; }
.quick-submit { width:100%; padding:16px 18px; font-weight:800; }
input,select,button { border-radius:14px; border:1px solid var(--line); }
input,select { min-width:0; padding:12px 14px; background:rgba(255,255,255,.72); }
button { padding:12px 16px; background:var(--accent); color:#fff; cursor:pointer; transition:transform 180ms ease, opacity 180ms ease, background 180ms ease; }
button:hover { transform:translateY(-1px); opacity:.94; }
button.secondary { background:rgba(255,255,255,.78); color:var(--text); }
button.danger { background:rgba(157,43,32,.12); color:var(--danger); }
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; }
th,td { padding:14px 12px; border-bottom:1px solid var(--line); text-align:left; vertical-align:middle; }
th { font-size:.84rem; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); }
tbody tr:last-child td { border-bottom:none; }
.legend-item { display:inline-flex; align-items:center; gap:8px; padding:8px 12px; border-radius:999px; background:rgba(255,255,255,.68); color:var(--muted); font-size:.88rem; }
.legend-swatch { width:12px; height:12px; border-radius:999px; }
.chart-summary,.annual-note,.status-row { margin:14px 0 0; color:var(--muted); line-height:1.65; }
.trend-chart { margin-top:18px; }
.trend-chart svg { width:100%; height:auto; display:block; }
.annual-stats-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:14px; }
.annual-card { padding:18px; border-radius:18px; border:1px solid var(--line); background:rgba(255,255,255,.7); }
.annual-card-label { margin:0; font-size:.8rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }
.annual-card-value { margin:10px 0 0; font-size:1.6rem; font-weight:800; }
.annual-card-meta { margin:8px 0 0; color:var(--muted); line-height:1.5; }
.type-pill { display:inline-flex; padding:6px 10px; border-radius:999px; font-size:.82rem; font-weight:700; }
.type-expense { background:rgba(242,92,42,.12); color:#c3481d; }
.type-income { background:rgba(13,124,102,.12); color:#0c6f5c; }
.empty-state { padding:28px 12px; text-align:center; color:var(--muted); }
.progress-text { font-variant-numeric:tabular-nums; }
.negative { color:var(--danger); }
.positive { color:var(--accent-strong); }
@media (max-width:1040px){.hero,.content-grid,.stats-grid,.insight-grid{grid-template-columns:1fr}.hero h1{max-width:none}}
@media (max-width:720px){.app-shell{width:min(100% - 20px, 1200px);padding-top:20px;padding-bottom:110px}.hero,.panel,.stat-card{border-radius:20px}.hero,.panel{padding:18px}.panel-heading,.transaction-heading{align-items:flex-start}.inline-form,.transaction-form{width:100%;justify-content:flex-start}.inline-form > *,.transaction-form > *{width:100%}.quick-grid,.annual-stats-grid{grid-template-columns:1fr}.type-toggle{flex:1 1 0}.mobile-panel{position:sticky;bottom:12px;z-index:4;box-shadow:0 18px 48px rgba(20,22,24,.18)}th,td{padding:12px 8px}}
</style>
