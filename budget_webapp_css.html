<style>
@import url("https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&family=Noto+Sans+JP:wght@400;500;700;800&display=swap");

:root {
  --bg: #eef2f8;
  --bg-accent: #e5ebfb;
  --surface: #ffffff;
  --surface-soft: #f7f9ff;
  --surface-strong: #1f2a7a;
  --text: #172033;
  --muted: #69728a;
  --line: #dbe3f3;
  --line-strong: #c7d2eb;
  --primary: #3d4fd6;
  --primary-deep: #25349f;
  --primary-soft: #edf1ff;
  --success: #147d61;
  --success-soft: #e7f7f1;
  --warning: #9b6a12;
  --warning-soft: #fff3df;
  --danger: #b24141;
  --danger-soft: #fdecec;
  --shadow: 0 18px 50px rgba(41, 55, 108, 0.08);
  --radius-xl: 28px;
  --radius-lg: 20px;
  --radius-md: 16px;
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  min-height: 100%;
}

body {
  color: var(--text);
  font-family: "Noto Sans JP", sans-serif;
  background:
    radial-gradient(circle at top right, rgba(61, 79, 214, 0.10), transparent 24%),
    linear-gradient(180deg, #f6f8fd 0%, #eef2f8 34%, #edf2f8 100%);
}

button,
input,
select {
  font: inherit;
  min-height: 48px;
}

button {
  appearance: none;
  border: none;
  cursor: pointer;
  transition: transform 160ms ease, box-shadow 160ms ease, opacity 160ms ease;
}

button:hover {
  transform: translateY(-1px);
}

.app-topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  padding: 16px 24px;
  background: linear-gradient(135deg, #1b2470, #24328d 58%, #3244bc);
  color: #fff;
  box-shadow: 0 10px 28px rgba(36, 50, 141, 0.18);
}

.topbar-brand,
.topbar-actions,
.hero-badges,
.quick-type-switch,
.chip-group,
.chart-legend,
.panel-heading,
.transaction-heading,
.inline-form,
.transaction-form {
  display: flex;
  gap: 12px;
}

.topbar-brand {
  align-items: center;
}

.topbar-actions {
  align-items: center;
  margin-left: auto;
}

.brand-mark {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 42px;
  height: 42px;
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.16);
  font-family: "Manrope", "Noto Sans JP", sans-serif;
  font-weight: 800;
  letter-spacing: -0.04em;
}

.stat-label,
.annual-card-label,
th,
td::before {
  margin: 0;
  color: var(--muted);
  font-size: 0.78rem;
  font-weight: 800;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.topbar-brand strong {
  display: block;
  font-family: "Manrope", "Noto Sans JP", sans-serif;
  font-size: 1rem;
  font-weight: 800;
  letter-spacing: -0.03em;
}

.hero-badge,
.legend-item,
.group-badge,
.type-pill {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 999px;
  font-weight: 700;
  white-space: nowrap;
}

.app-shell,
.stat-card,
.panel {
  width: min(1240px, calc(100% - 32px));
  margin: 16px auto 0;
}

.app-shell {
  padding: 0 0 56px;
}

.stat-card,
.panel {
  border: 1px solid var(--line);
  border-radius: var(--radius-xl);
  background: rgba(255, 255, 255, 0.94);
  box-shadow: var(--shadow);
}

.panel h2,
.stat-value,
.annual-card-value {
  font-family: "Manrope", "Noto Sans JP", sans-serif;
}

.section-copy,
.chart-summary,
.annual-note,
.status-row,
.month-caption,
.stat-subtext,
.annual-card-meta {
  color: var(--muted);
  line-height: 1.7;
}

.topbar-month,
input,
select {
  width: 100%;
  min-width: 0;
  padding: 13px 14px;
  border: 1px solid var(--line-strong);
  border-radius: var(--radius-md);
  background: #fff;
  color: var(--text);
  outline: none;
  box-shadow: none;
}

input:focus,
select:focus {
  border-color: rgba(61, 79, 214, 0.36);
  box-shadow: 0 0 0 4px rgba(61, 79, 214, 0.10);
}

.sheet-link {
  display: inline-flex;
  align-items: center;
  width: fit-content;
  margin-top: 14px;
  color: var(--primary-deep);
  text-decoration: none;
  font-weight: 700;
}

.sheet-link::after {
  content: "↗";
  margin-left: 6px;
}

.topbar-link {
  margin-top: 0;
  color: #fff;
  font-weight: 700;
}

.topbar-month {
  width: 176px;
  padding: 10px 12px;
  border-color: rgba(255, 255, 255, 0.16);
  background: rgba(255, 255, 255, 0.10);
  color: #fff;
}

.topbar-month::-webkit-calendar-picker-indicator {
  filter: invert(1);
}

.stats-grid,
.insight-grid,
.content-grid,
.review-grid {
  display: grid;
  gap: 18px;
  margin-top: 18px;
}

.stats-grid {
  grid-template-columns: repeat(4, minmax(0, 1fr));
}

.insight-grid {
  grid-template-columns: minmax(0, 1.25fr) minmax(0, 0.95fr);
}

.content-grid,
.review-grid {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.stat-card {
  padding: 22px;
}

.stat-label {
  color: var(--muted);
}

.stat-value {
  margin: 12px 0 0;
  font-size: clamp(1.85rem, 3vw, 2.6rem);
  line-height: 1;
  letter-spacing: -0.05em;
}

.stat-subtext {
  margin: 10px 0 0;
  font-size: 0.92rem;
}

.panel {
  padding: 24px;
}

.panel-heading,
.transaction-heading {
  align-items: center;
  justify-content: space-between;
}

.compact-heading {
  margin-bottom: 18px;
}

.section-copy {
  margin: 8px 0 0;
  font-size: 0.94rem;
}

.capture-panel {
  background: linear-gradient(180deg, #ffffff, #f9fbff);
}

.quick-entry-form,
.field-block {
  display: flex;
  flex-direction: column;
}

.quick-entry-form {
  gap: 14px;
}

.quick-type-switch {
  align-self: flex-start;
  padding: 4px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: var(--surface-soft);
}

.type-toggle,
.chip-button {
  background: #fff;
  color: var(--text);
  box-shadow: none;
}

.type-toggle {
  padding: 12px 18px;
  border-radius: 14px;
  font-weight: 800;
}

.type-toggle.active {
  background: linear-gradient(135deg, var(--primary), var(--primary-deep));
  color: #fff;
  box-shadow: 0 10px 24px rgba(61, 79, 214, 0.24);
}

.quick-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 12px;
}

.field-block {
  gap: 8px;
}

.field-block span,
.chip-title {
  margin: 0;
  color: var(--muted);
  font-size: 0.84rem;
  font-weight: 700;
}

.chip-group {
  flex-wrap: wrap;
}

.chip-button {
  padding: 10px 14px;
  border: 1px solid var(--line);
  font-size: 0.9rem;
}

.quick-submit,
.inline-form button,
.transaction-form button,
button {
  padding: 12px 16px;
  border-radius: 16px;
  background: linear-gradient(135deg, var(--primary), var(--primary-deep));
  color: #fff;
  box-shadow: 0 12px 28px rgba(61, 79, 214, 0.22);
}

.quick-submit {
  width: 100%;
  padding: 15px 18px;
  font-weight: 800;
}

.inline-form,
.transaction-form {
  flex-wrap: wrap;
  justify-content: flex-end;
}

.inline-form > *,
.transaction-form > * {
  flex: 1 1 140px;
}

.danger {
  background: var(--danger-soft);
  color: var(--danger);
  box-shadow: none;
}

.conditional-field.is-hidden,
#transactionCategoryDetailField.is-hidden {
  display: none;
}

.table-wrap {
  overflow-x: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th,
td {
  padding: 14px 12px;
  border-bottom: 1px solid var(--line);
  text-align: left;
  vertical-align: middle;
}

th {
  color: var(--muted);
  font-size: 0.76rem;
}

tbody tr:last-child td {
  border-bottom: none;
}

.category-name {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.category-note {
  color: var(--muted);
  font-size: 0.82rem;
}

.group-badge {
  padding: 7px 12px;
  font-size: 0.76rem;
  letter-spacing: 0.04em;
}

.group-business,
.type-income,
.positive {
  color: var(--success);
}

.group-business {
  background: var(--success-soft);
}

.group-private,
.type-expense {
  color: var(--danger);
}

.group-private {
  background: var(--danger-soft);
}

.group-review {
  background: var(--warning-soft);
  color: var(--warning);
}

.budget-input {
  min-width: 120px;
  text-align: right;
}

.legend-item {
  gap: 8px;
  padding: 8px 12px;
  border: 1px solid var(--line);
  background: var(--surface-soft);
  color: var(--muted);
  font-size: 0.85rem;
}

.legend-swatch {
  width: 12px;
  height: 12px;
  border-radius: 50%;
}

.chart-summary,
.annual-note,
.status-row {
  margin: 14px 0 0;
}

.trend-chart {
  margin-top: 18px;
  padding: 14px;
  border-radius: 18px;
  background: linear-gradient(180deg, #f8faff, #ffffff);
  border: 1px solid var(--line);
}

.trend-chart svg {
  display: block;
  width: 100%;
  height: auto;
}

.annual-stats-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
}

.annual-card {
  padding: 18px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: var(--surface-soft);
}

.annual-card-value {
  margin: 10px 0 0;
  font-size: 1.65rem;
  line-height: 1.04;
  letter-spacing: -0.04em;
}

.annual-card-meta {
  margin: 8px 0 0;
}

.type-pill {
  padding: 6px 10px;
  font-size: 0.8rem;
}

.type-expense {
  background: var(--danger-soft);
}

.type-income {
  background: var(--success-soft);
}

.row-review {
  background: rgba(255, 243, 223, 0.48);
}

.empty-state {
  padding: 28px 12px;
  text-align: center;
  color: var(--muted);
}

.progress-text {
  font-variant-numeric: tabular-nums;
}

.negative {
  color: var(--danger);
}

@media (max-width: 1080px) {
  .insight-grid,
  .content-grid,
  .review-grid,
  .stats-grid {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 720px) {
  .app-topbar {
    padding: 16px;
    align-items: flex-start;
    flex-direction: column;
  }

  .topbar-actions {
    width: 100%;
    margin-left: 0;
  }

  .topbar-month {
    width: 100%;
  }

  .panel,
  .stat-card {
    border-radius: 22px;
  }

  .panel,
  .stat-card {
    padding: 18px;
  }

  .stats-grid,
  .insight-grid,
  .content-grid,
  .review-grid {
    gap: 16px;
    margin-top: 16px;
  }

  .panel-heading,
  .transaction-heading {
    align-items: flex-start;
    flex-direction: column;
  }

  .app-shell {
    width: min(100% - 16px, 1240px);
    margin-top: 14px;
    padding-bottom: calc(32px + env(safe-area-inset-bottom, 0px));
  }

  .panel-heading h2,
  .transaction-heading h2 {
    font-size: 1.35rem;
    line-height: 1.12;
  }

  .quick-type-switch {
    position: sticky;
    top: 10px;
    z-index: 4;
    width: 100%;
    background: rgba(247, 249, 255, 0.96);
    box-shadow: 0 10px 24px rgba(41, 55, 108, 0.10);
  }

  .quick-grid,
  .annual-stats-grid {
    grid-template-columns: 1fr;
  }

  .type-toggle {
    flex: 1 1 0;
  }

  .type-toggle,
  .chip-button,
  .quick-submit,
  .inline-form button,
  .transaction-form button {
    min-height: 52px;
  }

  .chip-group {
    gap: 8px;
  }

  .chip-button {
    flex: 1 1 calc(50% - 8px);
    justify-content: center;
    padding: 12px 10px;
  }

  .inline-form,
  .transaction-form {
    width: 100%;
    justify-content: flex-start;
  }

  .inline-form > *,
  .transaction-form > * {
    width: 100%;
    flex-basis: 100%;
  }

  .capture-panel {
    scroll-margin-top: 12px;
  }

  .table-wrap {
    overflow: visible;
  }

  table,
  thead,
  tbody,
  tr,
  td {
    display: block;
    width: 100%;
  }

  thead {
    display: none;
  }

  tbody {
    display: grid;
    gap: 10px;
  }

  tr {
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: 18px;
    background: #fff;
    box-shadow: 0 8px 24px rgba(41, 55, 108, 0.05);
  }

  td {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(23, 32, 51, 0.08);
    text-align: right;
  }

  td:last-child {
    border-bottom: none;
    padding-bottom: 0;
  }

  td::before {
    flex: 0 0 42%;
    color: var(--muted);
    font-size: 0.74rem;
    text-align: left;
    content: "";
  }

  #categoryTableBody td:nth-child(1)::before { content: "カテゴリ"; }
  #categoryTableBody td:nth-child(2)::before { content: "区分"; }
  #categoryTableBody td:nth-child(3)::before { content: "月予算"; }

  #incomeTargetTableBody td:nth-child(1)::before { content: "項目"; }
  #incomeTargetTableBody td:nth-child(2)::before { content: "月目標"; }
  #incomeTargetTableBody td:nth-child(3)::before { content: "操作"; }

  #transactionTableBody td:nth-child(1)::before { content: "日付"; }
  #transactionTableBody td:nth-child(2)::before { content: "区分"; }
  #transactionTableBody td:nth-child(3)::before { content: "カテゴリ"; }
  #transactionTableBody td:nth-child(4)::before { content: "金額"; }
  #transactionTableBody td:nth-child(5)::before { content: "メモ"; }
  #transactionTableBody td:nth-child(6)::before { content: "操作"; }

  #reviewTableBody td:nth-child(1)::before { content: "日付"; }
  #reviewTableBody td:nth-child(2)::before { content: "カテゴリ"; }
  #reviewTableBody td:nth-child(3)::before { content: "金額"; }
  #reviewTableBody td:nth-child(4)::before { content: "補足"; }

  #summaryTableBody td:nth-child(1)::before { content: "カテゴリ"; }
  #summaryTableBody td:nth-child(2)::before { content: "予算"; }
  #summaryTableBody td:nth-child(3)::before { content: "使用額"; }
  #summaryTableBody td:nth-child(4)::before { content: "残額"; }
  #summaryTableBody td:nth-child(5)::before { content: "消化率"; }

  .category-name {
    align-items: flex-end;
  }

  .category-name strong,
  .category-note {
    width: 100%;
  }

  .budget-input {
    min-width: 0;
  }
}
</style>
