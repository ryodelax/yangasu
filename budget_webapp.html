<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <base target="_top">
  <title>Budget Orbit</title>
  <style>
    <?!= css ?>
  </style>
</head>
<body>
  <header class="app-topbar">
    <div class="topbar-brand">
      <span class="brand-mark">BO</span>
      <strong>Budget Orbit</strong>
    </div>
    <div class="topbar-actions">
      <input id="monthPicker" class="topbar-month" type="month" aria-label="対象月">
      <a id="sheetLink" class="sheet-link topbar-link" href="#" target="_blank" rel="noopener noreferrer">Sheet</a>
    </div>
  </header>

  <main class="app-shell">
    <section class="stats-grid" id="statsGrid"></section>

    <section class="insight-grid">
      <article class="panel chart-panel">
        <div class="panel-heading compact-heading">
          <div>
            <h2>収支トレンド</h2>
          </div>
        </div>
        <div id="chartLegend" class="chart-legend"></div>
        <p id="chartSummary" class="chart-summary"></p>
        <div id="trendChart" class="trend-chart"></div>
      </article>

      <article class="panel pace-panel">
        <div class="panel-heading compact-heading">
          <div>
            <h2>年間ペース</h2>
          </div>
        </div>
        <div id="annualStatsGrid" class="annual-stats-grid"></div>
        <p id="annualNote" class="annual-note"></p>
      </article>
    </section>

    <section class="panel capture-panel">
      <div class="panel-heading compact-heading">
        <div>
          <h2>クイック入力</h2>
        </div>
      </div>

      <form id="quickEntryForm" class="quick-entry-form">
        <div class="quick-type-switch" role="group" aria-label="入出金区分">
          <button type="button" class="type-toggle active" data-quick-type="expense">支出</button>
          <button type="button" class="type-toggle" data-quick-type="income">収入</button>
        </div>

        <div class="quick-grid">
          <label class="field-block">
            <span>日付</span>
            <input name="date" type="date" required>
          </label>
          <label class="field-block">
            <span>金額</span>
            <input name="amount" type="number" min="0" step="1" inputmode="numeric" required>
          </label>
        </div>

        <label class="field-block">
          <span>カテゴリ</span>
          <select name="category" id="quickCategorySelect" required></select>
        </label>

        <label class="field-block conditional-field is-hidden" id="quickCategoryDetailField">
          <span>その他の内容</span>
          <input name="categoryDetail" type="text" placeholder="何に使ったかを入力">
        </label>

        <div>
          <p class="chip-title">よく使うカテゴリ</p>
          <div id="quickCategoryChips" class="chip-group"></div>
        </div>

        <div>
          <p class="chip-title">金額プリセット</p>
          <div class="chip-group" id="amountPresetChips">
            <button type="button" class="chip-button" data-amount="500">¥500</button>
            <button type="button" class="chip-button" data-amount="1000">¥1,000</button>
            <button type="button" class="chip-button" data-amount="3000">¥3,000</button>
            <button type="button" class="chip-button" data-amount="5000">¥5,000</button>
            <button type="button" class="chip-button" data-amount="10000">¥10,000</button>
          </div>
        </div>

        <label class="field-block">
          <span>メモ</span>
          <input name="note" type="text" placeholder="店舗名・補足">
        </label>

        <input name="type" type="hidden" value="expense">
        <button class="quick-submit" type="submit">この内容で保存</button>
      </form>
    </section>

    <section class="content-grid">
      <article class="panel">
        <div class="panel-heading">
          <div>
            <h2>カテゴリ予算</h2>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>カテゴリ</th>
                <th>区分</th>
                <th>月予算</th>
              </tr>
            </thead>
            <tbody id="categoryTableBody"></tbody>
          </table>
        </div>
      </article>

      <article class="panel">
        <div class="panel-heading">
          <div>
            <h2>収益目標</h2>
          </div>
          <form id="incomeTargetForm" class="inline-form">
            <input name="name" type="text" placeholder="収益項目" required>
            <input name="target" type="number" min="0" step="1000" placeholder="目標額" required>
            <button type="submit">追加</button>
          </form>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>項目</th>
                <th>月目標</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="incomeTargetTableBody"></tbody>
          </table>
        </div>
      </article>
    </section>

    <section class="panel">
      <div class="panel-heading transaction-heading">
        <div>
          <h2>入出金記録</h2>
        </div>

        <form id="transactionForm" class="transaction-form">
          <input name="date" type="date" required>
          <select name="type" id="transactionTypeSelect" required>
            <option value="expense">支出</option>
            <option value="income">収入</option>
          </select>
          <select name="category" id="transactionCategorySelect" required></select>
          <input name="categoryDetail" id="transactionCategoryDetailField" class="is-hidden" type="text" placeholder="その他の内容">
          <input name="amount" type="number" min="0" step="1" placeholder="金額" required>
          <input name="note" type="text" placeholder="メモ">
          <button type="submit">記録</button>
        </form>
      </div>
      <div class="status-row"><span id="saveStatus">未保存の変更はありません</span></div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>日付</th>
              <th>区分</th>
              <th>カテゴリ</th>
              <th>金額</th>
              <th>メモ</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="transactionTableBody"></tbody>
        </table>
      </div>
    </section>

    <section class="review-grid">
      <article class="panel review-panel">
        <div class="panel-heading compact-heading">
          <div>
            <h2>要確認トレイ</h2>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>日付</th>
                <th>カテゴリ</th>
                <th>金額</th>
                <th>補足</th>
              </tr>
            </thead>
            <tbody id="reviewTableBody"></tbody>
          </table>
        </div>
      </article>

      <article class="panel">
        <div class="panel-heading">
          <div>
            <h2>カテゴリ別の残予算</h2>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>カテゴリ</th>
                <th>予算</th>
                <th>使用額</th>
                <th>残額</th>
                <th>消化率</th>
              </tr>
            </thead>
            <tbody id="summaryTableBody"></tbody>
          </table>
        </div>
      </article>
    </section>
  </main>

  <template id="emptyStateTemplate">
    <tr><td colspan="6" class="empty-state">まだデータがありません。</td></tr>
  </template>

  <script>
    window.__BUDGET_BOOTSTRAP__ = <?!= bootstrap ?>;
    <?!= js ?>
  </script>
</body>
</html>
